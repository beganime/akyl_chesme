version: '3.8'

services:
  web:
    build: .
    container_name: akyl_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: akyl_celery
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info -Q main-queue
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      # Celery теперь тоже будет использовать RabbitMQ как надежного брокера!
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/ 
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: akyl_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0000}
      POSTGRES_DB: ${POSTGRES_DB:-chat}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akyl_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === НОВЫЙ СЕРВИС: RabbitMQ ===
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: akyl_rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Порт самого брокера
      - "15672:15672" # Панель управления UI (логин guest/guest)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: