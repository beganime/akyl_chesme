services:
  web:
    build: .
    container_name: akyl_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - SERVER_REGION=RU # В Туркменистане тут нужно будет написать TM
      - POSTGRES_SERVER=pgbouncer
      - POSTGRES_PORT=6432 
      - REDIS_HOST=redis
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: akyl_celery
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info -Q main-queue
    environment:
      - SERVER_REGION=RU
      - POSTGRES_SERVER=pgbouncer
      - POSTGRES_PORT=6432
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/ 
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: akyl_pgbouncer
    restart: always
    environment:
      - POSTGRESQL_USERNAME=${POSTGRES_USER:-postgres}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD:-0000}
      - POSTGRESQL_DATABASE=${POSTGRES_DB:-chat}
      - POSTGRESQL_HOST=db
      - POSTGRESQL_PORT=5432
      # Явно указываем внутренний порт для PgBouncer
      - PGBOUNCER_LISTEN_PORT=6432 
      - PGBOUNCER_POOL_MODE=transaction
      - PGBOUNCER_MAX_CLIENT_CONN=10000
      - PGBOUNCER_DEFAULT_POOL_SIZE=40
    ports:
      # Пробрасываем 6432 порт наружу
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: akyl_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0000}
      POSTGRES_DB: ${POSTGRES_DB:-chat}
      POSTGRES_HOST_AUTH_METHOD: md5 
    # СТРОКИ С ports ЗДЕСЬ БОЛЬШЕ НЕТ!
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=logical", "-c", "password_encryption=md5"] 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: akyl_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: akyl_rabbitmq
    restart: always
    ports:
      - "5672:5672"   
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: