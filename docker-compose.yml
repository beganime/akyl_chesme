version: '3.8'

services:
  # 1. PostgreSQL - Основная база данных
  db:
    image: postgres:15-alpine
    container_name: akyl_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: akyl_chesme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis - Кэш и Pub/Sub для WebSocket
  redis:
    image: redis:7-alpine
    container_name: akyl_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. MinIO - S3-совместимое хранилище для файлов (Аватарки, Медиа)
  # Заменяет AWS S3 для локальной разработки
  minio:
    image: minio/minio
    container_name: akyl_minio
    restart: always
    ports:
      - "9000:9000"       # API порт
      - "9001:9001"       # Порт веб-консоли
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data: