version: "3.9"

services:
  # ── Backend API ────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akyl_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SERVER_REGION=${SERVER_REGION:-RU}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akyl_celery
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app.celery_app worker
      --loglevel=info
      -Q main-queue
      --concurrency=4
      --max-tasks-per-child=1000
    environment:
      - SERVER_REGION=${SERVER_REGION:-RU}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Celery Beat (планировщик) ──────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akyl_beat
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app.celery_app beat
      --loglevel=info
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: akyl_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Только localhost
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: akyl_rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"    # Только localhost
      - "127.0.0.1:15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-akyl}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-akyl_secret}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redis_data:
  rabbitmq_data: