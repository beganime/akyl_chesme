services:
  web:
    build: .
    container_name: akyl_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Позволяет динамически задавать регион сервера
      - SERVER_REGION=${SERVER_REGION:-RU} 
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: akyl_celery
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info -Q main-queue
    environment:
      - SERVER_REGION=${SERVER_REGION:-RU}
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/ 
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Redis оставляем ЛОКАЛЬНЫМ на каждом сервере. 
  # Он нужен для сверхбыстрого кэша сессий и управления вебсокетами конкретного узла.
  redis:
    image: redis:7-alpine
    container_name: akyl_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Межсерверная шина для передачи сообщений чата между РФ и ТКМ серверами
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: akyl_rabbitmq
    restart: always
    ports:
      - "5672:5672"   
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

volumes:
  redis_data:
  rabbitmq_data: